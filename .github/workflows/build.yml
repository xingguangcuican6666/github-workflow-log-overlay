name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            bundles: deb,rpm
          - platform: windows-latest
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build Tauri app
        run: npm run tauri -- build --bundles ${{ matrix.bundles }}

      - name: Build portable Linux tarball
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          npm run tauri -- build --no-bundle
          npm run package:linux-portable -- linux-x86_64

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: github-workflow-log-overlay-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*
            dist-portable/*.tar.gz
          if-no-files-found: error

  arch:
    name: Build Arch package
    runs-on: ubuntu-latest
    container: archlinux:latest

    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel sudo git nodejs npm rust webkit2gtk-4.1 gtk3 libayatana-appindicator librsvg patchelf github-cli
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        run: |
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c "cd '$GITHUB_WORKSPACE/packaging/arch' && makepkg --noconfirm --cleanbuild"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: github-workflow-log-overlay-archlinux
          path: packaging/arch/*.pkg.tar.zst
          if-no-files-found: error
